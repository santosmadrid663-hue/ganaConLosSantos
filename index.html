<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ganaConLosSantos</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
color:#0a7cff;
}

.grid{
display:grid;
grid-template-columns:repeat(10,70px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.numero{
background:white;
border:2px solid #ccc;
padding:12px;
cursor:pointer;
}

.numero.activo{
background:#0a7cff;
color:white;
}

.panel{
margin-top:30px;
font-size:20px;
}

.boton{
margin-top:20px;
padding:15px 30px;
font-size:18px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Rifa ganaConLosSantos</h1>

<p>Selecciona mínimo 4 números</p>

<div class="grid" id="numeros"></div>

<div class="panel">

<p><b>Números seleccionados:</b></p>
<p id="seleccionados"></p>

<p><b>Total a pagar:</b> $<span id="total">0</span></p>

<button class="boton">Comprar números</button>

</div>

<script>

let precio = 600;

let seleccionados = [];

let contenedor = document.getElementById("numeros");

for(let i=10000;i<=10099;i++){

let btn = document.createElement("div");

btn.className="numero";

btn.innerText=i;

btn.onclick=function(){

if(seleccionados.includes(i)){

seleccionados=seleccionados.filter(n=>n!==i);

btn.classList.remove("activo");

}else{

seleccionados.push(i);

btn.classList.add("activo");

}

document.getElementById("seleccionados").innerText = seleccionados.join(", ");

let total = seleccionados.length * precio;

document.getElementById("total").innerText = total;

};

contenedor.appendChild(btn);

}

</script>

</body>
</html>
