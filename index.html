<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa GanaConLosSantos</title>

<style>

body{
font-family: Arial;
padding:30px;
text-align:center;
}

button{
padding:15px;
font-size:16px;
cursor:pointer;
}

#numeros{
margin-top:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.numero{
background:#90ee90;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Rifa GanaConLosSantos</h1>

<h3>Valor por número: $100 COP</h3>
<h3>Mínimo de compra: 50 números</h3>

<br>

<button onclick="generarNumeros()">
Generar números aleatorios
</button>

<div id="numeros"></div>

<h2 id="total"></h2>

<script>

const precioNumero = 100;
const minimoCompra = 50;

function generarNumeros(){

let numeros = [];

while(numeros.length < minimoCompra){

let n = Math.floor(Math.random() * (99999 - 10000 + 1)) + 10000;

if(!numeros.includes(n)){
numeros.push(n);
}

}

mostrarNumeros(numeros);

}

function mostrarNumeros(lista){

const contenedor = document.getElementById("numeros");
contenedor.innerHTML="";

lista.forEach(n => {

let div = document.createElement("div");
div.className="numero";
div.innerText = n;

contenedor.appendChild(div);

});

document.getElementById("total").innerText =
"Total a pagar: $" + (lista.length * precioNumero) + " COP";

}

</script>

</body>
</html>
