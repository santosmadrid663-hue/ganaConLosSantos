<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ganaConLosSantos - Rifa</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #numeros-container { display: flex; flex-wrap: wrap; gap: 5px; max-height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
  .numero { width: 70px; height: 40px; cursor: pointer; }
  .numero.seleccionado { background-color: lightgreen; }
  #busqueda { margin-bottom: 10px; }
</style>
</head>
<body>

<h2>Selecciona tus números de la rifa</h2>

<input type="number" id="busqueda" placeholder="Buscar número 10000-99999">
<button onclick="buscarNumero()">Buscar</button>

<div id="numeros-container"></div>

<div style="margin-top:10px;">
  <b>Total a pagar:</b> $<span id="total">0</span>
</div>

<script>
const precioPorNumero = 600;
let numerosSeleccionados = [];

// Generar todos los números de 5 dígitos
let numerosDisponibles = [];
for (let i = 10000; i <= 99999; i++) {
    numerosDisponibles.push(i);
}

const contenedor = document.getElementById("numeros-container");

// Función para crear botones visibles (bloque de 200 números por rendimiento)
function mostrarNumeros(inicio = 0, cantidad = 200) {
    contenedor.innerHTML = ""; // limpiar
    for (let i = inicio; i < inicio + cantidad && i < numerosDisponibles.length; i++) {
        let boton = document.createElement("button");
        boton.textContent = numerosDisponibles[i];
        boton.classList.add("numero");
        if (numerosSeleccionados.includes(numerosDisponibles[i])) {
            boton.classList.add("seleccionado");
        }
        boton.onclick = () => toggleNumero(numerosDisponibles[i], boton);
        contenedor.appendChild(boton);
    }
}

// Inicialmente mostramos los primeros 200 números
mostrarNumeros(0, 200);

// Función para seleccionar/deseleccionar número
function toggleNumero(numero, boton) {
    const index = numerosSeleccionados.indexOf(numero);
    if (index > -1) {
        numerosSeleccionados.splice(index, 1);
        boton.classList.remove("seleccionado");
    } else {
        numerosSeleccionados.push(numero);
        boton.classList.add("seleccionado");
    }
    actualizarTotal();
}

// Actualizar el total
function actualizarTotal() {
    const total = numerosSeleccionados.length * precioPorNumero;
    document.getElementById("total").textContent = total;
}

// Buscar número específico
function buscarNumero() {
    const valor = parseInt(document.getElementById("busqueda").value);
    if (isNaN(valor) || valor < 10000 || valor > 99999) {
        alert("Ingresa un número válido entre 10000 y 99999");
        return;
    }
    contenedor.innerHTML = "";
    let boton = document.createElement("button");
    boton.textContent = valor;
    boton.classList.add("numero");
    if (numerosSeleccionados.includes(valor)) {
        boton.classList.add("seleccionado");
    }
    boton.onclick = () => toggleNumero(valor, boton);
    contenedor.appendChild(boton);
}

// Validación antes de enviar
function validarCompra() {
    if (numerosSeleccionados.length < 4) {
        alert("Debes seleccionar al menos 4 números para comprar.");
        return false;
    }
    alert("Compra realizada. Total a pagar: $" + (numerosSeleccionados.length * precioPorNumero));
    // Aquí puedes agregar la lógica para enviar los números al servidor
    return true;
}

// Ejemplo: botón de compra
const btnComprar = document.createElement("button");
btnComprar.textContent = "Comprar";
btnComprar.style.marginTop = "10px";
btnComprar.onclick = validarCompra;
document.body.appendChild(btnComprar);
</script>

</body>
</html>
