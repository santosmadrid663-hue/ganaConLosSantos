<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ganaConLosSantos</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#020617;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
max-width:900px;
margin:auto;
}

.numero{
background:#1e293b;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.numero:hover{
background:#22c55e;
}

.seleccionado{
background:#16a34a;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.total{
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<header>
ganaConLosSantos
</header>

<div class="container">

<h2>Compra tu número de la rifa</h2>

<p>Valor por número: <b>$600 COP</b></p>
<p>Compra mínima: <b>4 números</b></p>

<div class="grid" id="numeros"></div>

<div class="total">
Números seleccionados: <span id="cantidad">0</span><br>
Total a pagar: $<span id="total">0</span>
</div>

<button onclick="comprar()">Comprar</button>

</div>

<script>

let seleccionados=[]
let precio=600

for(let i=10000;i<=10099;i++){

let div=document.createElement("div")
div.className="numero"
div.innerText=i

div.onclick=function(){

if(seleccionados.includes(i)){
seleccionados=seleccionados.filter(n=>n!=i)
div.classList.remove("seleccionado")
}
else{
seleccionados.push(i)
div.classList.add("seleccionado")
}

document.getElementById("cantidad").innerText=seleccionados.length
document.getElementById("total").innerText=seleccionados.length*precio

}

document.getElementById("numeros").appendChild(div)

}

function comprar(){

if(seleccionados.length<4){
alert("Debes comprar mínimo 4 números")
return
}

alert("Tus números son: "+seleccionados.join(", "))

}

</script>

</body>
</html>
