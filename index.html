<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ganaConLosSantos</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:350px;
    margin:auto;
    margin-top:60px;
}

input{
    padding:10px;
    width:80%;
    font-size:16px;
    margin-top:10px;
}

button{
    padding:12px 20px;
    background:#22c55e;
    border:none;
    color:white;
    font-size:16px;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.total{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>🎉 ganaConLosSantos</h1>
<p>Compra tus números y gana $10.000.000</p>

<div class="container">

<label>¿Cuántos números deseas comprar?</label><br>

<input 
type="number" 
id="cantidad" 
min="4" 
value="4"
oninput="calcularTotal()"
>

<div class="total">
<b>Total a pagar:</b> $<span id="total">2400</span>
</div>

<button>Comprar números</button>

</div>

<script>

const precioNumero = 600;

function calcularTotal(){

let cantidad = document.getElementById("cantidad").value;

if(cantidad < 4){
cantidad = 4;
document.getElementById("cantidad").value = 4;
}

let total = cantidad * precioNumero;

document.getElementById("total").innerText = total.toLocaleString();

}

calcularTotal();

</script>

</body>
</html>
