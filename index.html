<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ganaConLosSantos</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

h1{
background:#111;
color:white;
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:5px;
max-width:600px;
margin:auto;
}

.numero{
padding:10px;
background:white;
border:1px solid #ccc;
cursor:pointer;
}

.numero:hover{
background:#d4f5d4;
}

.seleccionado{
background:#4CAF50;
color:white;
}

.panel{
margin-top:20px;
padding:20px;
background:white;
max-width:400px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>ganaConLosSantos</h1>

<h2>Valor por número: $600</h2>
<h3>Mínimo de compra: 4 números</h3>

<div class="grid" id="numeros"></div>

<div class="panel">
<p><b>Números seleccionados:</b></p>
<p id="seleccionados">Ninguno</p>

<p><b>Total a pagar:</b></p>
<p id="total">$0</p>
</div>

<script>

let precio = 600
let seleccionados = []

let contenedor = document.getElementById("numeros")

for(let i=10000;i<=10099;i++){

let div = document.createElement("div")
div.className="numero"
div.innerText=i

div.onclick=function(){

if(seleccionados.includes(i)){
seleccionados=seleccionados.filter(n=>n!=i)
div.classList.remove("seleccionado")
}else{
seleccionados.push(i)
div.classList.add("seleccionado")
}

actualizar()

}

contenedor.appendChild(div)

}

function actualizar(){

document.getElementById("seleccionados").innerText=seleccionados.join(", ")

let total = seleccionados.length * precio

document.getElementById("total").innerText="$"+total

}

</script>

</body>
</html>
