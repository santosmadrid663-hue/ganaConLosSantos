<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa - Gana Con Los Santos</title>

<style>
body{
font-family: Arial;
padding:20px;
}

#contenedor{
display:flex;
flex-wrap:wrap;
gap:5px;
max-height:400px;
overflow-y:auto;
border:1px solid #ccc;
padding:10px;
}

.numero{
width:60px;
height:40px;
border:1px solid #aaa;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.numero.seleccionado{
background:#90ee90;
}

.numero.vendido{
background:#ccc;
cursor:not-allowed;
}

button{
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<h2>Selecciona tus números de la rifa</h2>

<input type="number" id="busqueda" placeholder="Buscar número 10000-99999">

<br><br>

<div id="contenedor"></div>

<h3 id="cantidad">Seleccionados: 0</h3>
<h3 id="total">Total: $0 COP</h3>

<button onclick="comprar()">Comprar números</button>

<script>

const precioNumero = 100;
const minimoCompra = 50;

let seleccionados = [];

const contenedor = document.getElementById("contenedor");

for(let i=10000;i<=99999;i++){

let div=document.createElement("div");
div.className="numero";
div.textContent=i;

div.onclick=()=>{
if(div.classList.contains("vendido")) return;

if(div.classList.contains("seleccionado")){
div.classList.remove("seleccionado");
seleccionados=seleccionados.filter(n=>n!=i);
}else{
div.classList.add("seleccionado");
seleccionados.push(i);
}

actualizar();
};

contenedor.appendChild(div);

}

function actualizar(){

document.getElementById("cantidad").innerText =
"Seleccionados: "+seleccionados.length;

document.getElementById("total").innerText =
"Total: $"+(seleccionados.length*precioNumero)+" COP";

}

function comprar(){

if(seleccionados.length < minimoCompra){
alert("Debes comprar mínimo "+minimoCompra+" números");
return;
}

alert("Compra realizada por "+(seleccionados.length*precioNumero)+" COP");

}

</script>

</body>
</html>
